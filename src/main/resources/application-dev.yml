spring:
  application:
    name: journal
  datasource:
    url: jdbc:mysql://localhost:3306/journal?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: root
    password: Admin123#
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /journal